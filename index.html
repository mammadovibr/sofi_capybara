<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>Капибара София</title><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#120d0a;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}body{display:grid;place-items:center;background:radial-gradient(circle at 20% 10%,#ffb25e 0 16%,transparent 34%),linear-gradient(135deg,#26120d,#11352f)}.game{position:relative;width:min(100vw,430px);height:100dvh;max-height:932px;overflow:hidden;background:#efbd72;box-shadow:0 25px 90px #0008}canvas{width:100%;height:100%;display:block}.hud{position:absolute;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.chip{background:#fff0cddd;border:2px solid #2b170f33;border-radius:999px;padding:8px 12px;font-weight:950;color:#2b170f;box-shadow:0 8px 20px #7a3b1c22}.menu{position:absolute;inset:0;display:grid;place-items:center;padding:22px;background:linear-gradient(#2a120b11,#2a120b66);text-align:center}.card{max-width:350px;background:#fff0cdf0;border:3px solid #2b170f33;border-radius:16px;padding:24px 18px 18px;box-shadow:0 25px 80px #0005}h1{margin:0 0 8px;font-size:46px;line-height:.9;color:#2b170f}.card p{font-weight:800;color:#68402a;line-height:1.35}.btn{border:0;border-radius:12px;background:#c94b5d;color:#fff8d8;font:inherit;font-weight:950;font-size:20px;padding:14px 34px;box-shadow:0 8px 0 #8e2e3a}.ctrl{position:absolute;left:12px;right:12px;bottom:max(16px,env(safe-area-inset-bottom));display:flex;gap:18px;justify-content:center}.ctrl button{width:78px;height:58px;border:0;border-radius:14px;background:#c94b5d;color:#fff8d8;font-size:34px;font-weight:950;box-shadow:0 7px 0 #8e2e3a}.hide{display:none}
</style></head><body><main class="game"><canvas id="c"></canvas><div class="hud"><div class="chip" id="m">0 м</div><div class="chip" id="f">0 мандаринок</div></div><div class="ctrl"><button id="l">‹</button><button id="r">›</button></div><section class="menu" id="menu"><div class="card"><h1>София бежит</h1><p id="txt">Капибара София убегает от охотников в Мексике. Двигайся влево и вправо, собирай мандаринки и не врезайся в кактусы.</p><button class="btn" id="start">Играть</button></div></section></main><script>
const c=document.getElementById("c"),x=c.getContext("2d"),menu=document.getElementById("menu"),txt=document.getElementById("txt"),M=document.getElementById("m"),F=document.getElementById("f");let W,H,D,lane=[],S,audio,best=+localStorage.sofiaBestNice||0;
function size(){D=Math.min(devicePixelRatio||1,2);W=c.clientWidth;H=c.clientHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0);let g=Math.min(98,W*.25),m=W/2;lane=[m-g,m,m+g]}onresize=size;size();
function sound(f,d=.08,t="sine",v=.07){audio=audio||new(AudioContext||webkitAudioContext)();let o=audio.createOscillator(),g=audio.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,audio.currentTime+d);o.connect(g);g.connect(audio.destination);o.start();o.stop(audio.currentTime+d)}
function start(){audio=audio||new(AudioContext||webkitAudioContext)();audio.resume();S={run:1,t:0,last:0,dist:0,fruit:0,spd:4.7,lane:1,target:1,x:lane[1],obs:[],fr:[],hunters:[145,178],spawn:32,fs:52};menu.classList.add("hide");sound(340);sound(540,.12,"triangle");requestAnimationFrame(loop)}
function end(){if(!S.run)return;S.run=0;let d=Math.floor(S.dist);if(d>best){best=d;localStorage.sofiaBestNice=d}txt.textContent=`София пробежала ${d} м и собрала ${S.fruit} мандаринок. Рекорд: ${best} м.`;document.getElementById("start").textContent="Еще раз";menu.classList.remove("hide");sound(85,.25,"sawtooth",.05)}
function bg(){let q=(S?.t||0)*(S?.spd||4)%130,g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#f7794d");g.addColorStop(.38,"#f8bd66");g.addColorStop(.72,"#edc179");g.addColorStop(1,"#ad693e");x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle="#ffe3a4";x.beginPath();x.arc(W*.78,H*.15,43,0,7);x.fill();x.fillStyle="#6d553f";x.beginPath();x.moveTo(0,H*.54);x.lineTo(W*.24,H*.3);x.lineTo(W*.53,H*.56);x.fill();x.fillStyle="#3f684d";x.beginPath();x.moveTo(W*.33,H*.56);x.lineTo(W*.7,H*.28);x.lineTo(W,H*.55);x.fill();x.fillStyle="#b96f41";x.beginPath();x.moveTo(0,H*.64);x.quadraticCurveTo(W*.25,H*.58,W*.5,H*.64);x.quadraticCurveTo(W*.76,H*.7,W,H*.6);x.lineTo(W,H);x.lineTo(0,H);x.fill();x.fillStyle="#e9b465";x.beginPath();x.moveTo(W*.08,H);x.lineTo(W*.38,H*.47);x.lineTo(W*.62,H*.47);x.lineTo(W*.92,H);x.fill();x.strokeStyle="#70411f55";x.lineWidth=3;for(let y=H*.48+q-130;y<H+160;y+=130){x.beginPath();x.moveTo(W*.39,y);x.lineTo(W*.23,y+130);x.moveTo(W*.61,y);x.lineTo(W*.77,y+130);x.stroke()}x.fillStyle="#57301920";for(let i=0;i<12;i++){let y=(i*92+q*1.6)%(H+90),px=lane[i%3]+Math.sin(i*2.3)*28;x.beginPath();x.ellipse(px,y,15,5,.1,0,7);x.fill()}}
function sombrero(px,py,s){x.save();x.translate(px,py);x.scale(s,s);x.fillStyle="#ecd36c";x.beginPath();x.ellipse(0,5,44,12,0,0,7);x.fill();x.fillStyle="#d69738";x.beginPath();x.moveTo(-18,5);x.quadraticCurveTo(0,-34,19,5);x.fill();x.strokeStyle="#b93e43";x.lineWidth=4;x.beginPath();x.moveTo(-23,4);x.lineTo(23,4);x.stroke();x.restore()}
function capy(px,py){let leg=Math.sin(S.t*.95);x.save();x.translate(px,py+Math.sin(S.t*.42)*2);x.fillStyle="#0003";x.beginPath();x.ellipse(2,42,51,11,0,0,7);x.fill();x.strokeStyle="#583426";x.lineWidth=8;x.lineCap="round";x.beginPath();x.moveTo(-27,20);x.lineTo(-38+leg*9,43);x.moveTo(-3,24);x.lineTo(-12-leg*9,44);x.moveTo(22,20);x.lineTo(13+leg*8,43);x.stroke();x.fillStyle="#8e5e3f";x.beginPath();x.ellipse(-6,0,50,31,-.05,0,7);x.fill();x.fillStyle="#b6784e";x.beginPath();x.ellipse(29,-13,27,23,.08,0,7);x.fill();x.fillStyle="#6a3e2b";x.beginPath();x.arc(15,-32,7,0,7);x.arc(41,-30,6,0,7);x.fill();x.fillStyle="#1d100c";x.beginPath();x.arc(37,-15,4,0,7);x.fill();x.fillStyle="#4b2b1f";x.beginPath();x.ellipse(56,-5,9,5,0,0,7);x.fill();x.strokeStyle="#362018";x.lineWidth=2;x.beginPath();x.arc(42,-4,10,.2,1.5);x.stroke();sombrero(8,-41,.63);x.restore()}
function hunter(px,py,i){let leg=Math.sin(S.t*.98+i);x.save();x.translate(px,py+Math.sin(S.t*.42+i)*3);x.globalAlpha=.94;x.fillStyle="#0002";x.beginPath();x.ellipse(0,43,35,9,0,0,7);x.fill();sombrero(0,-39,.56);x.fillStyle="#6a3f31";x.beginPath();x.arc(0,-28,13,0,7);x.fill();x.fillStyle=i?"#314f42":"#70403a";x.fillRect(-15,-18,30,38);x.strokeStyle="#2b1a14";x.lineWidth=6;x.lineCap="round";x.beginPath();x.moveTo(-8,16);x.lineTo(-21+leg*8,40);x.moveTo(8,16);x.lineTo(21-leg*8,40);x.moveTo(12,-8);x.lineTo(32,-20);x.stroke();x.strokeStyle="#4a2a1c";x.lineWidth=5;x.beginPath();x.moveTo(25,-24);x.lineTo(47,-31);x.stroke();x.restore()}
function cactus(px,py){x.save();x.translate(px,py);x.strokeStyle="#2c6e42";x.lineWidth=16;x.lineCap="round";x.beginPath();x.moveTo(0,34);x.lineTo(0,-34);x.moveTo(-3,-6);x.quadraticCurveTo(-33,-9,-26,-34);x.moveTo(5,4);x.quadraticCurveTo(34,1,27,-25);x.stroke();x.strokeStyle="#c9efba70";x.lineWidth=2;x.beginPath();x.moveTo(-4,28);x.lineTo(-4,-28);x.stroke();x.restore()}
function mand(px,py,s){x.save();x.translate(px,py+Math.sin(s)*4);x.rotate(Math.sin(s)*.16);x.fillStyle="#f58220";x.beginPath();x.arc(0,0,18,0,7);x.fill();x.fillStyle="#ffb04f";x.beginPath();x.arc(-6,-6,5,0,7);x.fill();x.fillStyle="#317a3d";x.beginPath();x.ellipse(4,-20,10,5,-.5,0,7);x.fill();x.restore()}
function draw(){bg();if(!S){capy(W/2,H*.76);return}hunter(lane[0],H*.76+S.hunters[0],0);hunter(lane[2],H*.76+S.hunters[1],1);for(const f of S.fr)mand(lane[f.lane],f.y,f.s);for(const o of S.obs)cactus(lane[o.lane],o.y);capy(S.x,H*.76)}
function move(d){if(!S?.run)return;S.target=Math.max(0,Math.min(2,S.target+d));sound(180,.03,"square",.025)}
function loop(now){if(!S?.run)return;let st=(now-(S.last||now))/16.67;S.last=now;st=Math.min(2,st||1);S.t+=st;S.spd=Math.min(10.5,S.spd+.002*st);S.dist+=S.spd*.06*st;S.x+=(lane[S.target]-S.x)*.28;if(Math.abs(S.x-lane[S.target])<2)S.lane=S.target;S.spawn-=st;if(S.spawn<0){S.obs.push({lane:Math.random()*3|0,y:-70});S.spawn=Math.max(28,52+Math.random()*34-S.spd*2.2)}S.fs-=st;if(S.fs<0){S.fr.push({lane:Math.random()*3|0,y:-45,s:Math.random()*7});S.fs=42+Math.random()*52}for(const o of S.obs)o.y+=S.spd*st;for(const f of S.fr){f.y+=S.spd*st;f.s+=.08*st}for(let i=0;i<S.hunters.length;i++){S.hunters[i]-=.018*st;if(S.hunters[i]<56)end()}for(const o of S.obs){if(o.lane===S.lane&&Math.abs(o.y-H*.76)<48)end()}for(const f of S.fr)if(f.lane===S.lane&&Math.abs(f.y-H*.76)<48){f.take=1;S.fruit++;S.dist+=18;S.hunters[0]+=6;S.hunters[1]+=6;sound(620,.06,"triangle");sound(820,.07,"triangle")}S.obs=S.obs.filter(o=>o.y<H+90);S.fr=S.fr.filter(f=>f.y<H+60&&!f.take);M.textContent=Math.floor(S.dist)+" м";F.textContent=S.fruit+" мандаринок";draw();requestAnimationFrame(loop)}
document.getElementById("start").onclick=start;document.getElementById("l").onclick=()=>move(-1);document.getElementById("r").onclick=()=>move(1);let p=null;c.onpointerdown=e=>p=[e.clientX,e.clientY];c.onpointerup=e=>{if(!p)return;let dx=e.clientX-p[0];if(Math.abs(dx)>20)move(dx>0?1:-1);p=null};onkeydown=e=>{if(e.code==="ArrowLeft")move(-1);if(e.code==="ArrowRight")move(1);if(e.code==="Enter"&&!S?.run)start()};draw();
</script></body></html>
